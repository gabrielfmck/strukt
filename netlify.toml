# netlify.toml

[build]
  base = "."                     # Caminho base para o diretório do projeto
  publish = "build"              # Diretório de saída da build (ajuste se necessário)
  command = "npm run build"      # Comando de build para o seu projeto

# Se você precisar de variáveis de ambiente
[build.environment]
  NODE_ENV = "production"        # Exemplo de variável de ambiente

# Configuração adicional (opcional)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = true
